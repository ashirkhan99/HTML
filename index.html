<!DOCTYPE html>
<html>
<head>
    <title>Forex Clone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <center>
        <h2>Forex Clone</h2>
        
        <hr width="80%">

        <!-- Navbar -->
        <p>
            <a href="#">Home</a> |
            <a href="#">Markets</a> |
            <a href="#">Trade</a> |
            <a href="#">Login</a>
        </p>

        <hr width="80%">

        <!-- Hero Section -->
        <h1>Trade Forex Easily</h1>
        <p>Simple forex trading platform</p>

        <button>Start Trading</button>

        <br><br>
        <hr width="60%">

        <!-- Market Section -->
        <h2>Live Market</h2>

        <table border="1" cellpadding="10">
            <tr>
                <th>Currency Pair</th>
                <th>Price</th>
            </tr>
            <tr>
                <td>EUR/USD</td>
                <td>1.10</td>
            </tr>
            <tr>
                <td>GBP/USD</td>
                <td>1.25</td>
            </tr>
        </table>

        <br>
        <button>Refresh</button>

        <br><br>
        <hr width="60%">

        <!-- Form -->
        <h2>Open Account</h2>

        <form>
            Name:<br>
            <input type="text"><br><br>

            Email:<br>
            <input type="email"><br><br>

            Password:<br>
            <input type="password"><br><br>

            <input type="submit" value="Register">
        </form>

        <br><br>
        <hr width="80%">

        <!-- Footer -->
        <p>© 2026 Forex Clone</p>

    </center>

</body>
</html>
